version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: architect_db
    environment:
      POSTGRES_USER: architect
      POSTGRES_PASSWORD: architect_pass
      POSTGRES_DB: architect_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U architect"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: architect_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://architect:architect_pass@db:5432/architect_db
      SECRET_KEY: your-secret-key-here
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -c \"from app.db.base import Base; from app.db.session import engine; import asyncio; asyncio.run(Base.metadata.create_all(engine))\" || true &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
